<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>TrAIner Hub - Documentação</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Plataforma inteligente de planejamento e acompanhamento de dietas com IA">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <!-- Theme -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  
  <!-- Custom CSS -->
  <style>
    :root {
      --theme-color: #6366f1;
      --theme-color-dark: #4f46e5;
    }
    
    .app-name-link img {
      width: 40px;
      margin-right: 10px;
    }
    
    .sidebar {
      padding-top: 0;
    }
    
    .sidebar > h1 {
      margin: 0 auto 1rem;
      font-size: 1.5rem;
      font-weight: 300;
      text-align: center;
      background: linear-gradient(135deg, var(--theme-color) 0%, var(--theme-color-dark) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .markdown-section {
      max-width: 900px;
    }
    
    .cover-main {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    
    .cover-main > p:last-child a {
      background-color: var(--theme-color);
      border-radius: 8px;
      padding: 12px 24px;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    
    .cover-main > p:last-child a:hover {
      background-color: var(--theme-color-dark);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
    }
    
    /* Badge styles */
    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.85em;
      font-weight: 600;
      margin-left: 8px;
    }
    
    .badge-dev {
      background-color: #fbbf24;
      color: #78350f;
    }
    
    .badge-new {
      background-color: #34d399;
      color: #064e3b;
    }
    
    .badge-pending {
      background-color: #94a3b8;
      color: #1e293b;
    }
  </style>
</head>
<body>
  <div id="app">Carregando...</div>
  
  <script>
    window.$docsify = {
      name: 'TrAIner Hub',
      repo: 'MateusO97/trainer-hub-docs',
      loadSidebar: true,
      loadNavbar: false,
      coverpage: true,
      onlyCover: true,
      
      // Logo
      logo: 'https://raw.githubusercontent.com/MateusO97/trainer-hub-docs/master/assets/logo.svg',
      
      // Search
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Buscar documentação...',
        noData: 'Nenhum resultado encontrado',
        depth: 3,
        namespace: 'trainer-hub-docs',
      },
      
      // Pagination
      pagination: {
        previousText: '← Anterior',
        nextText: 'Próximo →',
        crossChapter: true,
      },
      
      // Copy code
      copyCode: {
        buttonText: 'Copiar',
        errorText: 'Erro',
        successText: 'Copiado!',
      },
      
      // Tabs
      tabs: {
        persist: true,
        sync: true,
        theme: 'classic',
        tabComments: true,
        tabHeadings: true
      },
      
      // Auto header
      auto2top: true,
      
      // Markdown extensions
      markdown: {
        renderer: {
          code: function(code, lang) {
            if (lang === "mermaid") {
              return '<div class="mermaid">' + code + '</div>';
            }
            return this.origin.code.apply(this, arguments);
          }
        }
      },
      
      // Plugins
      plugins: [
        function(hook, vm) {
          // Footer
          hook.beforeEach(function(html) {
            return html;
          });
          
          hook.afterEach(function(html, next) {
            const footer = `
              <hr/>
              <footer>
                <span>
                  Feito com ❤️ por <a href="https://github.com/MateusO97" target="_blank">Mateus O. Barbosa</a> | 
                  <a href="https://github.com/MateusO97/trainer-hub-docs" target="_blank">GitHub</a> | 
                  Última atualização: ${new Date().getFullYear()}
                </span>
              </footer>
            `;
            next(html + footer);
          });
        }
      ]
    }
  </script>
  
  <!-- Docsify core -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  
  <!-- Search plugin -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  
  <!-- Copy code plugin -->
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  
  <!-- Pagination plugin -->
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
  
  <!-- Zoom image plugin -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
  
  <!-- Tabs plugin -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-tabs@1"></script>
  
  <!-- Mermaid -->
  <script type="module">
    import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs";
    mermaid.initialize({ startOnLoad: true });
    window.mermaid = mermaid;
  </script>
  
  <!-- Syntax highlighting -->
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-kotlin.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-java.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-javascript.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
</body>
</html>
