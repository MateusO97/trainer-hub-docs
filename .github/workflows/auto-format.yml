name: Auto-format Code

on:
  push:
    branches: ['feature/**', 'bugfix/**', 'refactor/**']

jobs:
  auto-format:
    name: Auto-format and Commit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: ${{ github.head_ref }}
          
      # Backend
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
          
      - name: Run ktlintFormat
        run: |
          chmod +x gradlew
          ./gradlew ktlintFormat || true
          
      # Frontend
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json
          
      - name: Install frontend dependencies
        working-directory: mobile
        run: npm ci
        continue-on-error: true
        
      - name: Run Prettier
        working-directory: mobile
        run: npm run format || true
        
      - name: Run ESLint fix
        working-directory: mobile
        run: npm run lint:fix || true
        
      # Commit se houver mudanças
      - name: Check for changes
        id: verify_diff
        run: |
          git diff --quiet . || echo "changed=true" >> $GITHUB_OUTPUT
          
      - name: Commit changes
        if: steps.verify_diff.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git commit -m "style: auto-format code with ktlint and prettier [skip ci]"
          
      - name: Push changes
        if: steps.verify_diff.outputs.changed == 'true'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
          
      - name: Comment on commit
        if: steps.verify_diff.outputs.changed == 'true'
        uses: actions/github-script@v6
        with:
          script: |
            const sha = '${{ github.sha }}';
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: sha,
              body: '🤖 Auto-formatted code with ktlint and prettier'
            });
