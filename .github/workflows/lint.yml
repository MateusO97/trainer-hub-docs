name: Code Linting & Formatting

on:
  push:
    branches: [develop, master, main]
  pull_request:
    branches: [develop, master, main]

jobs:
  # Backend (Kotlin)
  lint-backend:
    name: Lint Backend (Kotlin)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
          
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        
      - name: Run ktlint check
        run: ./gradlew ktlintCheck
        continue-on-error: true
        id: ktlint
        
      - name: Run detekt
        run: ./gradlew detekt
        continue-on-error: true
        id: detekt
        
      - name: Upload ktlint report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: ktlint-report
          path: '**/build/reports/ktlint/'
          if-no-files-found: ignore
          
      - name: Upload detekt report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: detekt-report
          path: '**/build/reports/detekt/'
          if-no-files-found: ignore
          
      - name: Fail if linting errors
        if: steps.ktlint.outcome == 'failure' || steps.detekt.outcome == 'failure'
        run: exit 1

  # Frontend (React Native)
  lint-frontend:
    name: Lint Frontend (React Native)
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: mobile
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run ESLint
        run: npm run lint
        continue-on-error: true
        id: eslint
        
      - name: Run Prettier check
        run: npm run format:check
        continue-on-error: true
        id: prettier
        
      - name: Run TypeScript check
        run: npm run type-check
        continue-on-error: true
        id: typescript
        
      - name: Fail if linting errors
        if: |
          steps.eslint.outcome == 'failure' ||
          steps.prettier.outcome == 'failure' ||
          steps.typescript.outcome == 'failure'
        run: exit 1

  # Comentar PR com resultados
  comment-pr:
    name: Comment Lint Results
    runs-on: ubuntu-latest
    needs: [lint-backend, lint-frontend]
    if: always() && github.event_name == 'pull_request'
    
    steps:
      - name: Comment PR
        uses: actions/github-script@v6
        with:
          script: |
            const backendStatus = '${{ needs.lint-backend.result }}';
            const frontendStatus = '${{ needs.lint-frontend.result }}';
            
            let message = '## 🔍 Lint Results\n\n';
            message += `- **Backend (Kotlin)**: ${backendStatus === 'success' ? '✅ Passed' : '❌ Failed'}\n`;
            message += `- **Frontend (React Native)**: ${frontendStatus === 'success' ? '✅ Passed' : '❌ Failed'}\n\n`;
            
            if (backendStatus !== 'success' || frontendStatus !== 'success') {
              message += '### ⚠️ Action Required\n\n';
              message += 'Please fix linting errors before merging:\n\n';
              
              if (backendStatus !== 'success') {
                message += '**Backend**:\n';
                message += '```bash\n';
                message += './gradlew ktlintFormat  # Auto-fix formatting\n';
                message += './gradlew detekt        # Check static analysis\n';
                message += '```\n\n';
              }
              
              if (frontendStatus !== 'success') {
                message += '**Frontend**:\n';
                message += '```bash\n';
                message += 'cd mobile\n';
                message += 'npm run lint:fix    # Auto-fix ESLint\n';
                message += 'npm run format      # Auto-fix Prettier\n';
                message += 'npm run type-check  # Check TypeScript\n';
                message += '```\n\n';
              }
              
              message += '---\n';
              message += '📚 See [CODE-STYLING-LINTING.md](../docs/INFRASTRUCTURE/CODE-STYLING-LINTING.md) for more details.';
            } else {
              message += '### ✅ All checks passed!\n\n';
              message += 'Code is properly formatted and passes all linting rules.';
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });
